services:
  klink:
    build: .
    image: klink:local
    container_name: klink
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      KLINK_DATABASE: /data/klink.db
      KLINK_PUBLIC_BASE_URL: http://localhost:5000
      WHATSAPP_PHONE: ""
      EVOLUTION_API_URL: ""
      EVOLUTION_API_KEY: ""
      EVOLUTION_INSTANCE: ""
      OPENAI_API_KEY: ""
      OPENAI_MODEL: gpt-4o-mini
      OPENAI_TRANSCRIPTION_MODEL: gpt-4o-mini-transcribe
      SUPABASE_URL: ""
      SUPABASE_SERVICE_ROLE_KEY: ""
      KLINK_ADMIN_TOKEN: ""
      KLINK_DASHBOARD_USER: admin
      KLINK_DASHBOARD_PASSWORD: ""
      # Segredo que blinda o /webhook contra mensagens forjadas (pedidos/cobranca falsa).
      KLINK_WEBHOOK_SECRET: ""
      # Garcom valida cada mesa no painel antes de liberar pedidos.
      # Protege o QR permanente contra abertura por quem nao esta no local.
      KLINK_REQUIRE_TABLE_VALIDATION: "true"
    volumes:
      - klink_data:/data

volumes:
  klink_data:
